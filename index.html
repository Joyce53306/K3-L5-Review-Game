<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Weather Spin & Act</title>
    <style>
        body { text-align: center; font-family: 'Comic Sans MS', sans-serif; background: #fffde7; user-select: none; }
        .game-board { margin: 20px auto; width: 90%; background: white; padding: 20px; border-radius: 25px; box-shadow: 0 8px 16px rgba(0,0,0,0.1); }
        #wheel { width: 400px; height: 400px; border-radius: 50%; border: 12px solid #ffcc80; cursor: pointer; margin: 20px auto; transition: transform 3s cubic-bezier(0.17, 0.67, 0.12, 0.99); background: conic-gradient(red, orange, yellow, green, blue, indigo, violet); display: flex; align-items: center; justify-content: center; }
        #wheel::after { content: "SPIN"; color: white; font-size: 40px; font-weight: bold; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
        #weather-display { height: 250px; margin-top: 20px; border-radius: 15px; }
        .sentence { font-size: 48px; color: #37474f; margin: 30px; font-weight: bold; text-transform: lowercase; }
    </style>
</head>
<body>

    <h1>weather spin & act</h1>
    <div class="game-board">
        <div id="wheel" onclick="spinWheel()"></div>
        <div id="result-area">
            <img id="weather-display" src="" alt="Weather" style="display:none;">
            <div class="sentence" id="q-text">click the wheel to start!</div>
        </div>
    </div>

    <script>
        const weatherData = [
            {name: "hot", img: "hot.jpg.jpg"},
            {name: "cold", img: "cold.jpg.jpg"},
            {name: "sunny", img: "sunny.jpg.jpg"},
            {name: "rainy", img: "rainy.jpg.jpg"},
            {name: "cloudy", img: "cloudy.jpg.jpg"},
            {name: "snowy", img: "snowy.jpg.jpg"},
            {name: "windy", img: "windy.jpg.jpg"},
            {name: "partly cloudy", img: "partly cloudy.jpg.jpg"},
            {name: "stormy", img: "stormy.jpg.jpg"},
            {name: "rainbow", img: "rainbow.jpg.jpg"},
            {name: "typhoon", img: "typhoon.jpg.jpg"}
        ];

        let isSpinning = false;

        function spinWheel() {
            if (isSpinning) return;
            isSpinning = true;
            
            let wheel = document.getElementById('wheel');
            let qText = document.getElementById('q-text');
            let imgDisplay = document.getElementById('weather-display');
            
            imgDisplay.style.display = 'none';
            qText.innerText = "what's the weather like?";
            
            // 轉盤旋轉
            let randomDeg = Math.floor(Math.random() * 1440) + 2160; 
            wheel.style.transform = `rotate(${randomDeg}deg)`;
            
            // 1. 先唸問句
            let questionMsg = new SpeechSynthesisUtterance("What's the weather like?");
            questionMsg.rate = 0.8;
            window.speechSynthesis.speak(questionMsg);

            // 2. 等待 3 秒後顯示圖片 (文字控制)
            setTimeout(() => {
                let item = weatherData[Math.floor(Math.random() * weatherData.length)];
                imgDisplay.src = item.img;
                imgDisplay.style.display = 'inline-block';
            }, 3000);

            // 3. 等待 10 秒後唸出答案
            setTimeout(() => {
                let currentItem = weatherData.find(i => i.img === imgDisplay.src.split('/').pop());
                if (currentItem) {
                    qText.innerHTML = "what's the weather like?<br>it's " + currentItem.name + ".";
                    let answerMsg = new SpeechSynthesisUtterance("It's " + currentItem.name + ".");
                    answerMsg.rate = 0.8;
                    window.speechSynthesis.speak(answerMsg);
                }
                isSpinning = false;
            }, 10000); 
        }
    </script>
</body>
</html>
